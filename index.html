<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Berat & Ali Parkur Oyunu</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
overflow:hidden;
background:#67c5ff;
touch-action:none;
}

#gameContainer{
width:100vw;
height:100vh;
position:relative;
overflow:hidden;
}

#menu{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
background:linear-gradient(180deg,#5ac8ff,#2d79ff);
z-index:100;
}

#menu h1{
font-size:40px;
color:white;
}

.characterBox{
display:flex;
gap:20px;
}

.character{
width:120px;
height:150px;
background:white;
border-radius:20px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:30px;
cursor:pointer;
}

.character.selected{
border:6px solid gold;
}

button{
border:none;
padding:15px 30px;
font-size:18px;
border-radius:15px;
cursor:pointer;
}

#hud{
position:absolute;
top:10px;
left:10px;
z-index:10;
display:none;
gap:15px;
flex-wrap:wrap;
}

.hudBox{
background:rgba(255,255,255,.85);
padding:10px 15px;
border-radius:15px;
font-size:18px;
}

#nightBtn{
position:absolute;
top:10px;
right:10px;
z-index:10;
display:none;
}

#restartBtn{
position:absolute;
bottom:20px;
right:20px;
z-index:10;
display:none;
}

#game{
width:100%;
height:100%;
position:relative;
overflow:hidden;
}

#sky{
position:absolute;
width:100%;
height:100%;
background:#7ed8ff;
transition:.4s;
}

#player{
width:70px;
height:90px;
position:absolute;
bottom:110px;
left:80px;
border-radius:20px;
display:none;
justify-content:center;
align-items:center;
font-size:45px;
z-index:5;
}

.ground{
position:absolute;
bottom:0;
width:100%;
height:100px;
background:#3fb64f;
}

.obstacle{
position:absolute;
bottom:100px;
width:50px;
height:50px;
font-size:45px;
}

.coin{
position:absolute;
bottom:200px;
font-size:35px;
}

.tree{
position:absolute;
bottom:100px;
font-size:70px;
}

.cloud{
position:absolute;
top:50px;
font-size:60px;
}

#finish{
position:absolute;
bottom:100px;
font-size:80px;
display:none;
}

#controls{
position:absolute;
bottom:20px;
left:20px;
display:none;
z-index:10;
}

#jumpBtn{
width:90px;
height:90px;
border-radius:50%;
font-size:30px;
}

.gameOver{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:30px;
border-radius:20px;
display:none;
z-index:20;
text-align:center;
}

</style>
</head>

<body>

<div id="gameContainer">

<div id="menu">

<h1>🏃 Parkur Oyunu</h1>

<div class="characterBox">

<div class="character" onclick="selectCharacter('😎')">

😎

<p>Berat</p>

</div>

<div class="character" onclick="selectCharacter('🧢')">

🧢

<p>Ali</p>

</div>

</div>

<button onclick="startGame()">

Başlat

</button>

</div>

<div id="hud">

<div class="hudBox" id="life">❤️❤️❤️</div>

<div class="hudBox" id="score">🏁 0</div>

<div class="hudBox" id="coinCount">🪙 0</div>

</div>

<button id="nightBtn" onclick="toggleNight()">

🌙

</button>

<button id="restartBtn" onclick="location.reload()">

🔄

</button>

<div id="game">

<div id="sky"></div>

<div class="ground"></div>

<div id="player"></div>

<div id="finish">🏁</div>

</div>

<div id="controls">

<button id="jumpBtn">

⬆️

</button>

</div>

<div class="gameOver" id="gameOver">

<h2>Bitti</h2>

<p id="finalScore"></p>

<button onclick="location.reload()">

Tekrar Oyna

</button>

</div>

</div>

<script>

let selectedCharacter="";

let player=document.getElementById("player");

let game=document.getElementById("game");

let score=0;

let coins=0;

let lives=3;

let gameRunning=false;

let jumping=false;

let position=110;

let night=false;

let speed=6;

function selectCharacter(icon){

selectedCharacter=icon;

document.querySelectorAll(".character")
.forEach(c=>c.classList.remove("selected"));

event.currentTarget.classList.add("selected");

}

function startGame(){

if(selectedCharacter=="") return;

document.getElementById("menu").style.display="none";

document.getElementById("hud").style.display="flex";

document.getElementById("nightBtn").style.display="block";

document.getElementById("restartBtn").style.display="block";

document.getElementById("controls").style.display="block";

player.style.display="flex";

player.innerHTML=selectedCharacter;

gameRunning=true;

spawnLoop();

gameLoop();

}

function jump(){

if(jumping) return;

jumping=true;

let audio=new Audio(
'data:audio/wav;base64,UklGRjQAAABXQVZFZm10'
);

audio.play();

let up=setInterval(()=>{

position+=10;

player.style.bottom=position+"px";

if(position>=250){

clearInterval(up);

let down=setInterval(()=>{

position-=10;

player.style.bottom=position+"px";

if(position<=110){

position=110;

jumping=false;

clearInterval(down);

}

},20);

}

},20);

}

document.getElementById("jumpBtn")
.addEventListener("click",jump);

document.addEventListener("keydown",e=>{

if(e.code=="Space") jump();

});

function toggleNight(){

night=!night;

document.getElementById("sky")
.style.background=

night

?

"#101820"

:

"#7ed8ff";

}
function updateHud(){

document.getElementById("score")
.innerHTML="🏁 "+score;

document.getElementById("coinCount")
.innerHTML="🪙 "+coins;

let hearts="";

for(let i=0;i<lives;i++){

hearts+="❤️";

}

document.getElementById("life")
.innerHTML=hearts;

}

function loseLife(){

if(!gameRunning) return;

lives--;

updateHud();

if(lives<=0){

gameOver();

}

}

function gameOver(){

gameRunning=false;

document.getElementById("gameOver")
.style.display="block";

document.getElementById("finalScore")
.innerHTML=

"Skor: "+score+

"<br>Coin: "+coins;

}

function gameWin(){

gameRunning=false;

document.getElementById("gameOver")
.style.display="block";

document.getElementById("finalScore")
.innerHTML=

"🎉 Kazandın"

+"<br>Coin: "+coins;

}

function spawnObstacle(){

if(!gameRunning) return;

let rock=document.createElement("div");

rock.className="obstacle";

rock.innerHTML="🪨";

rock.style.left="100vw";

game.appendChild(rock);

moveObject(rock,true);

}

function spawnCoin(){

if(!gameRunning) return;

let coin=document.createElement("div");

coin.className="coin";

coin.innerHTML="🪙";

coin.style.left="100vw";

coin.style.bottom=

(150+Math.random()*150)

+"px";

game.appendChild(coin);

moveObject(coin,false);

}

function spawnTree(){

if(!gameRunning) return;

let tree=document.createElement("div");

tree.className="tree";

tree.innerHTML="🌳";

tree.style.left="100vw";

game.appendChild(tree);

moveDecoration(tree);

}

function spawnCloud(){

if(!gameRunning) return;

let cloud=document.createElement("div");

cloud.className="cloud";

cloud.innerHTML="☁️";

cloud.style.left="100vw";

cloud.style.top=

(20+Math.random()*120)

+"px";

game.appendChild(cloud);

moveDecoration(cloud);

}

function moveDecoration(el){

let left=window.innerWidth;

let move=setInterval(()=>{

if(!gameRunning){

clearInterval(move);

return;

}

left-=2;

el.style.left=left+"px";

if(left<-150){

el.remove();

clearInterval(move);

}

},20);

}

function moveObject(el,isObstacle){

let left=window.innerWidth;

let move=setInterval(()=>{

if(!gameRunning){

clearInterval(move);

return;

}

left-=speed;

el.style.left=left+"px";

let playerRect=

player.getBoundingClientRect();

let objRect=

el.getBoundingClientRect();

if(

playerRect.left<objRect.right &&

playerRect.right>objRect.left &&

playerRect.top<objRect.bottom &&

playerRect.bottom>objRect.top

){

if(isObstacle){

loseLife();

el.remove();

clearInterval(move);

return;

}

else{

coins++;

el.remove();

clearInterval(move);

updateHud();

return;

}

}

if(left<-100){

el.remove();

clearInterval(move);

}

},20);

}

function spawnLoop(){

setInterval(()=>{

if(!gameRunning) return;

spawnObstacle();

},1800);

setInterval(()=>{

if(!gameRunning) return;

spawnCoin();

},1400);

setInterval(()=>{

if(!gameRunning) return;

spawnTree();

},2500);

setInterval(()=>{

if(!gameRunning) return;

spawnCloud();

},3500);

}

function gameLoop(){

let loop=setInterval(()=>{

if(!gameRunning){

clearInterval(loop);

return;

}

score++;

updateHud();

if(score>=100){

let finish=

document.getElementById("finish");

finish.style.display="block";

finish.style.left="80%";

gameWin();

}

if(score%20==0){

speed+=0.4;

}

},300);

}

updateHud();

</script>

</body>

</html>
