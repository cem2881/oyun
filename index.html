<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Berat & Ali Parkur</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
overflow:hidden;
}

#menu{
height:100vh;
background:#4bb7ff;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
}

#menu button{
padding:15px 25px;
font-size:20px;
border:none;
border-radius:15px;
}

#oyun{
display:none;
position:relative;
height:100vh;
background:#87ceeb;
overflow:hidden;
}

#ust{
display:flex;
justify-content:space-between;
padding:15px;
font-size:24px;
font-weight:bold;
}

#zemin{
position:absolute;
bottom:0;
height:100px;
width:100%;
background:green;
}

#karakter{
position:absolute;
left:70px;
bottom:100px;
font-size:70px;
z-index:5;
}

#engel{
position:absolute;
right:-100px;
bottom:100px;
width:60px;
height:120px;
background:red;
border-radius:10px;
}

#zipla{
position:absolute;
bottom:20px;
right:20px;
padding:18px;
font-size:20px;
border:none;
border-radius:15px;
}

#bitis{
display:none;
height:100vh;
background:#4bb7ff;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
}

#bitis button{
padding:18px;
font-size:20px;
}

</style>

</head>

<body>

<div id="menu">

<h1>BERAT & ALİ PARKUR</h1>

<button onclick="karakterSec('😎')">

BERAT

</button>

<button onclick="karakterSec('🧢')">

ALİ

</button>

<div id="secili">

Karakter seç

</div>

<button onclick="oyunuBaslat()">

OYUNA BAŞLA

</button>

</div>

<div id="oyun">

<div id="ust">

<div id="can">

❤️❤️❤️

</div>

<div id="skor">

0

</div>

<div id="rekor">

0

</div>

</div>

<div id="karakter"></div>

<div id="engel"></div>

<div id="zemin"></div>

<button id="zipla">

⬆️ Zıpla

</button>

</div>

<div id="bitis">

<h1>

OYUN BİTTİ

</h1>

<div id="sonSkor"></div>

<button onclick="location.reload()">

🔄 Yeniden Başlat

</button>

</div>

<script>

let secilen="";
let skor=0;
let rekor=0;
let can=3;
let zipliyor=false;
let oyun=null;

function karakterSec(k){

secilen=k;

document.getElementById("secili").innerText="Seçildi";

}

function oyunuBaslat(){

if(secilen===""){

alert("Karakter seç");

return;

}

document.getElementById("karakter").innerHTML=secilen;

document.getElementById("menu").style.display="none";

document.getElementById("oyun").style.display="block";

if(oyun){

clearInterval(oyun);

}

oyunuCalistir();

}

function oyunuCalistir(){

let engel=document.getElementById("engel");

let karakter=document.getElementById("karakter");

let konum=-100;

oyun=setInterval(()=>{

konum+=8;

engel.style.right=konum+"px";

if(konum>window.innerWidth){

konum=-100;

skor++;

document.getElementById("skor").innerText=skor;

if(skor>rekor){

rekor=skor;

document.getElementById("rekor").innerText=rekor;

}

}

let karakterAlt=parseInt(karakter.style.bottom)||100;

let engelX=window.innerWidth-konum;

if(

engelX<140 &&

engelX>50 &&

karakterAlt<180

){

can--;

konum=-100;

if(can===2){

document.getElementById("can").innerText="❤️❤️";

}

if(can===1){

document.getElementById("can").innerText="❤️";

}

if(can===0){

clearInterval(oyun);

document.getElementById("oyun").style.display="none";

document.getElementById("bitis").style.display="flex";

document.getElementById("sonSkor").innerText="Skor: "+skor;

}

}

},20);

}

document.getElementById("zipla").onclick=function(){

if(zipliyor){

return;

}

zipliyor=true;

let karakter=document.getElementById("karakter");

karakter.style.bottom="260px";

setTimeout(()=>{

karakter.style.bottom="100px";

zipliyor=false;

},500);

}

</script>

</body>

</html>
