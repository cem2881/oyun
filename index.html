<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Berat & Ali Parkur Oyunu</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
overflow:hidden;
background:#6dcfff;
touch-action:none;
}

#menu{
position:fixed;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:25px;
background:linear-gradient(180deg,#56c8ff,#2d79ff);
z-index:100;
}

#menu h1{
color:white;
font-size:38px;
}

.characterArea{
display:flex;
gap:25px;
}

.character{
width:130px;
height:170px;
background:white;
border-radius:20px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:42px;
cursor:pointer;
font-weight:bold;
}

.selected{
border:5px solid gold;
}

#menu button{
padding:16px 35px;
font-size:20px;
border:none;
border-radius:20px;
}

#hud{
position:fixed;
top:10px;
left:10px;
display:none;
gap:10px;
flex-wrap:wrap;
z-index:20;
}

.box{
background:white;
padding:10px 15px;
border-radius:15px;
font-size:18px;
}

#nightBtn{
position:fixed;
top:10px;
right:10px;
width:60px;
height:60px;
font-size:25px;
border:none;
border-radius:50%;
display:none;
z-index:20;
}

#restartBtn{
position:fixed;
top:80px;
right:10px;
width:60px;
height:60px;
font-size:25px;
border:none;
border-radius:50%;
display:none;
z-index:20;
}

#game{
width:100vw;
height:100vh;
position:relative;
overflow:hidden;
}

#sky{
width:100%;
height:100%;
background:#79d6ff;
position:absolute;
transition:.4s;
}

#player{
position:absolute;
left:80px;
bottom:110px;
width:70px;
height:90px;
display:none;
justify-content:center;
align-items:center;
font-size:45px;
z-index:5;
}

#ground{
position:absolute;
bottom:0;
width:100%;
height:100px;
background:#43b74d;
}

#controls{
position:fixed;
bottom:20px;
right:20px;
display:none;
z-index:20;
}

#jumpBtn{
width:95px;
height:95px;
border:none;
border-radius:50%;
font-size:35px;
}

.object{
position:absolute;
}

#gameOver{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:30px;
border-radius:20px;
display:none;
z-index:50;
text-align:center;
}

#gameOver button{
padding:12px 20px;
border:none;
border-radius:15px;
margin-top:15px;
}

@media(max-width:700px){

.character{
width:110px;
height:150px;
}

#menu h1{
font-size:28px;
}

}

</style>

</head>

<body>

<div id="menu">

<h1>🏃 Parkur Oyunu</h1>

<div class="characterArea">

<div class="character" data-icon="😎">

😎

Berat

</div>

<div class="character" data-icon="🧢">

🧢

Ali

</div>

</div>

<button id="startBtn">

Başlat

</button>

</div>

<div id="hud">

<div class="box" id="life">

❤️❤️❤️

</div>

<div class="box" id="score">

🏁 0

</div>

<div class="box" id="coins">

🪙 0

</div>

</div>

<button id="nightBtn">

🌙

</button>

<button id="restartBtn">

🔄

</button>

<div id="game">

<div id="sky"></div>

<div id="ground"></div>

<div id="player"></div>

</div>

<div id="controls">

<button id="jumpBtn">

⬆️

</button>

</div>

<div id="gameOver">

<h2 id="resultText"></h2>

<button onclick="location.reload()">

Tekrar Oyna

</button>

</div>

<script>

let selected="";

let score=0;

let coin=0;

let life=3;

let speed=6;

let running=false;

let night=false;

let jumpState=false;

let playerY=110;

const player=document.getElementById("player");

const game=document.getElementById("game");

document.querySelectorAll(".character")

.forEach(el=>{

el.onclick=()=>{

document.querySelectorAll(".character")

.forEach(a=>{

a.classList.remove("selected");

});

el.classList.add("selected");

selected=el.dataset.icon;

};

});

document.getElementById("startBtn")

.onclick=()=>{

if(selected=="") return;

running=true;

document.getElementById("menu")

.style.display="none";

document.getElementById("hud")

.style.display="flex";

document.getElementById("controls")

.style.display="block";

document.getElementById("nightBtn")

.style.display="block";

document.getElementById("restartBtn")

.style.display="block";

player.style.display="flex";

player.innerHTML=selected;

startLoop();

};

function jump(){

if(jumpState) return;

jumpState=true;

navigator.vibrate?.(50);

let up=setInterval(()=>{

playerY+=10;

player.style.bottom=playerY+"px";

if(playerY>=250){

clearInterval(up);

let down=setInterval(()=>{

playerY-=10;

player.style.bottom=playerY+"px";

if(playerY<=110){

playerY=110;

jumpState=false;

clearInterval(down);

}

},20);

}

},20);

}

document.getElementById("jumpBtn")

.onclick=jump;

document.addEventListener("keydown",e=>{

if(e.code==="Space"){

jump();

}

});

document.getElementById("restartBtn")

.onclick=()=>{

location.reload();

};

document.getElementById("nightBtn")

.onclick=()=>{

night=!night;

document.getElementById("sky")

.style.background=

night

?

"#0f172a"

:

"#79d6ff";

};
function updateHud(){

document.getElementById("score")

.innerHTML="🏁 "+score;

document.getElementById("coins")

.innerHTML="🪙 "+coin;

document.getElementById("life")

.innerHTML="❤️".repeat(life);

}

function loseLife(){

life--;

updateHud();

if(life<=0){

finishGame(false);

}

}

function finishGame(win){

running=false;

document.getElementById("gameOver")

.style.display="block";

document.getElementById("resultText")

.innerHTML=

win

?

"🎉 Kazandın"

:

"😵 Oyun Bitti";

}

function createObject(icon,className,bottom){

let obj=document.createElement("div");

obj.className="object "+className;

obj.innerHTML=icon;

obj.style.left=window.innerWidth+"px";

obj.style.bottom=bottom+"px";

obj.style.fontSize=

className==="cloud"

?

"60px"

:

"50px";

game.appendChild(obj);

moveObject(obj,className);

}

function moveObject(obj,type){

let left=window.innerWidth;

let move=setInterval(()=>{

if(!running){

clearInterval(move);

return;

}

left-=speed;

obj.style.left=left+"px";

if(

type==="rock"

||

type==="coin"

){

let p=player.getBoundingClientRect();

let o=obj.getBoundingClientRect();

let hit=

p.left<o.right &&

p.right>o.left &&

p.top<o.bottom &&

p.bottom>o.top;

if(hit){

if(type==="rock"){

loseLife();

}

if(type==="coin"){

coin++;

}

obj.remove();

clearInterval(move);

updateHud();

return;

}

}

if(left<-100){

obj.remove();

clearInterval(move);

}

},20);

}

function startLoop(){

updateHud();

setInterval(()=>{

if(!running) return;

score++;

updateHud();

if(score===100){

finishGame(true);

}

if(score%20===0){

speed+=0.5;

}

},300);

setInterval(()=>{

if(!running) return;

createObject(

"🪨",

"rock",

"100"

);

},1800);

setInterval(()=>{

if(!running) return;

createObject(

"🪙",

"coin",

150+

Math.random()*120

);

},1500);

setInterval(()=>{

if(!running) return;

createObject(

"🌳",

"tree",

"100"

);

},3500);

setInterval(()=>{

if(!running) return;

let cloud=document.createElement("div");

cloud.className="object cloud";

cloud.innerHTML="☁️";

cloud.style.top=

20+

Math.random()*120

+"px";

cloud.style.left=

window.innerWidth+"px";

game.appendChild(cloud);

let left=window.innerWidth;

let move=setInterval(()=>{

if(!running){

clearInterval(move);

return;

}

left-=2;

cloud.style.left=

left+"px";

if(left<-100){

cloud.remove();

clearInterval(move);

}

},20);

},3000);

}

</script>

</body>

</html>
